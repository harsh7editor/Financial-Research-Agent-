# Agent configuration for Financial Research Analyst

# Orchestrator Agent Settings
orchestrator:
  name: "Orchestrator"
  description: "Coordinates all specialized agents"
  max_iterations: 10
  timeout_seconds: 300
  parallel_execution: true

# Data Collector Agent Settings
data_collector:
  name: "DataCollector"
  description: "Collects financial data from multiple sources"
  data_sources:
    - yahoo_finance
    - alpha_vantage
    - news_api
    - finnhub
  cache_ttl_seconds: 300
  rate_limit:
    requests_per_minute: 60

# Technical Analyst Agent Settings
technical_analyst:
  name: "TechnicalAnalyst"
  description: "Performs technical analysis"
  indicators:
    - name: RSI
      period: 14
      overbought: 70
      oversold: 30
    - name: MACD
      fast_period: 12
      slow_period: 26
      signal_period: 9
    - name: SMA
      periods: [20, 50, 200]
    - name: EMA
      periods: [12, 26]
    - name: Bollinger Bands
      period: 20
      std_dev: 2.0
  pattern_detection:
    enabled: true
    patterns:
      - double_top
      - double_bottom
      - head_shoulders
      - triangle
      - wedge

# Fundamental Analyst Agent Settings
fundamental_analyst:
  name: "FundamentalAnalyst"
  description: "Analyzes company fundamentals"
  valuation_methods:
    - dcf
    - multiples
    - ddm
  metrics:
    valuation:
      - pe_ratio
      - pb_ratio
      - ps_ratio
      - ev_ebitda
      - peg_ratio
    profitability:
      - gross_margin
      - operating_margin
      - net_margin
      - roe
      - roa
      - roic
    liquidity:
      - current_ratio
      - quick_ratio
      - cash_ratio
    solvency:
      - debt_to_equity
      - interest_coverage
      - debt_to_assets

# Sentiment Analyst Agent Settings
sentiment_analyst:
  name: "SentimentAnalyst"
  description: "Analyzes market sentiment"
  sources:
    - news
    - social_media
    - analyst_ratings
    - insider_activity
  sentiment_weights:
    news: 0.25
    social: 0.15
    analyst: 0.40
    insider: 0.20
  lookback_days: 30

# Risk Analyst Agent Settings
risk_analyst:
  name: "RiskAnalyst"
  description: "Assesses investment risks"
  metrics:
    - volatility
    - var
    - cvar
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - beta
  var_confidence: 0.95
  lookback_period_days: 252

# Thematic Analyst Agent Settings
thematic_analyst:
  name: "ThematicAnalyst"
  description: "Analyzes stocks grouped by investment themes and megatrends"
  config_file: "config/themes.yaml"
  max_constituents_per_theme: 15
  default_period: "1y"
  performance_periods:
    - 1w
    - 1m
    - 3m
    - 6m
    - 1y
    - ytd
  scoring:
    momentum_weights:
      short_term: 0.3
      medium_term: 0.4
      long_term: 0.3
    health_weights:
      performance: 0.35
      momentum: 0.25
      diversification: 0.20
      risk: 0.20
  enable_narrative: false

# Report Generator Agent Settings
report_generator:
  name: "ReportGenerator"
  description: "Generates research reports"
  formats:
    - json
    - markdown
    - pdf
    - html
  sections:
    - executive_summary
    - technical_analysis
    - fundamental_analysis
    - sentiment_analysis
    - risk_assessment
    - recommendation
    - disclaimers

# Macro Economic Settings (Phase 2)
macro:
  fred_series:
    federal_funds_rate: FEDFUNDS
    cpi: CPIAUCSL
    gdp: GDP
    unemployment: UNRATE
    consumer_confidence: UMCSENT
    pmi: NAPM
    housing_starts: HOUST
    treasury_2y: DGS2
    treasury_10y: DGS10
    treasury_30y: DGS30
  sector_rate_sensitivity:
    high_negative: [Real Estate, Utilities, Consumer Defensive]
    moderate_negative: [Financials, Communication Services]
    low_impact: [Technology, Healthcare, Energy]
    positive: [Financial Services]

# DCF Valuation Settings (Phase 2)
dcf:
  default_scenarios:
    bull:
      growth_premium: 0.02
      terminal_growth: 0.03
    base:
      growth_premium: 0.0
      terminal_growth: 0.025
    bear:
      growth_premium: -0.02
      terminal_growth: 0.02
  equity_risk_premium: 0.055
  default_risk_free_rate: 0.045
  projection_years: 10

# Portfolio Optimization Settings (Phase 2)
portfolio:
  min_weight: 0.0
  max_weight: 1.0
  risk_free_rate: 0.05
  efficient_frontier_points: 50
  rebalance_threshold: 0.05

# ML Forecast Settings (Phase 2)
forecast:
  lookback_years: 2
  horizons: [30, 60, 90]
  model: gradient_boosting
  n_estimators: 200
  confidence_level: 0.95

# Social Sentiment Settings (Phase 2)
social_sentiment:
  subreddits:
    - wallstreetbets
    - stocks
    - investing
  weights:
    reddit: 0.30
    news: 0.70
  request_timeout: 10

# LLM Settings (Open Source by Default)
llm:
  provider: "ollama"
  default_model: "llama4:latest"
  temperature: 0.1
  max_tokens: 4096
  fallback_model: "mistral:latest"
  # Alternative models: llama4, llama3.2, mistral, mixtral, codellama, phi3, qwen2.5

# Recommendation Thresholds
recommendation:
  strong_buy_threshold: 0.80
  buy_threshold: 0.65
  hold_threshold: 0.45
  sell_threshold: 0.30
  confidence_weights:
    technical: 0.25
    fundamental: 0.35
    sentiment: 0.20
    risk: 0.20
